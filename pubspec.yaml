name: missions
description: "A Flutter version of the Task Dominion application."
publish_to: 'none'

version: 2026.3.27+2076

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^4.5.0
  # FIX: Removed firebase_core_platform_interface to prevent cross-version channel conflicts
  firebase_auth: ^6.2.0
  cloud_firestore: ^6.1.3
  firebase_database: ^12.1.4

  # State Management
  provider: ^6.1.2

  # AI
  google_generative_ai: ^0.4.0 

  # UI & Utilities
  cupertino_icons: ^1.0.6
  intl: ^0.20.2
  fl_chart: ^1.1.1
  material_design_icons_flutter: ^7.0.7296
  collection: ^1.18.0 
  flutter_colorpicker: ^1.1.0
  smooth_page_indicator: ^2.0.1
  uuid: ^4.5.2
  http: ^1.6.0
  file_picker: ^10.3.10
  universal_html: ^2.2.4
  path_provider: ^2.1.2
  share_plus: ^12.0.1
  google_fonts: ^8.0.2
  flutter_animate: ^4.5.2
  gap: ^3.0.1
  connectivity_plus: ^7.0.0
  image_picker: ^1.2.1
  mime: ^2.0.0
  shared_preferences: ^2.5.4
  flutter_local_notifications: ^17.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mockito: ^5.4.4 
  change_app_package_name: ^1.1.0 
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/fonts/icons/icon.png"
  adaptive_icon_background: "#25282d"
  adaptive_icon_foreground: "assets/fonts/icons/icon.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/fonts/icons/icon.png"
    background_color: "#25282d"
    theme_color: "#25282d"
  windows:
    generate: true
    image_path: "assets/fonts/icons/icon.png"
    icon_size: 48
  macos:
    generate: true
    image_path: "assets/fonts/icons/icon.png"

flutter:
  uses-material-design: true
  fonts:
    - family: RobotoCondensed
      fonts:
        - asset: assets/fonts/RobotoCondensed-Regular.ttf
        - asset: assets/fonts/RobotoCondensed-Bold.ttf
          weight: 700
    - family: OpenSans
      fonts:
        - asset: assets/fonts/OpenSans-Regular.ttf
        - asset: assets/fonts/OpenSans-SemiBold.ttf
          weight: 600

dependency_overrides:
  material_design_icons_flutter:
    path: ./packages/material_design_icons_flutter