name: Flutter Android Build & Release

on:
  push:
    branches:
      - '**'
  pull_request:

permissions:
  contents: write

jobs:
  build_apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Get Flutter Dependencies
        run: flutter pub get

      - name: Create api_keys.dart from secret
        env:
          GEMINI_API_KEYS: ${{ secrets.GEMINI_API_KEYS }}
        run: |
          cat > lib/src/config/api_keys.dart << EOF
          // ignore_for_file: constant_identifier_names
          const List<String> geminiApiKeys = ['${GEMINI_API_KEYS}'];
          const String geminiModelName = 'gemini-flash-latest';
          EOF

      # The signing config in android/app/build.gradle.kts points at
      # ../../debug.keystore (i.e. the repo root). It's committed, so the
      # checkout step already places it where Gradle expects.
      - name: Build Android Release APK
        run: flutter build apk --release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-${{ github.run_number }}
          path: build/app/outputs/apk/release/app-release.apk
          if-no-files-found: error

      - name: Publish GitHub Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          files: build/app/outputs/apk/release/app-release.apk
          tag_name: build-${{ github.run_number }}
          name: Build ${{ github.run_number }}
          body: |
            Automated release from `main`.
            Commit: ${{ github.sha }}
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}
